version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: noithat_db_prod
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: noithat_system
    ports:
      - "5433:5432"
    volumes:
      - noithat_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: noithat_backend_prod
    environment:
      - DATABASE_URL=postgresql://admin:admin_password@db:5432/noithat_system?schema=public
      - JWT_SECRET=super_secret_noithat_jwt_key
    ports:
      - "3001:3001"
    volumes:
      - noithat_uploads:/app/backend/uploads
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: noithat_frontend_prod
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  noithat_db_data:
  noithat_uploads:
